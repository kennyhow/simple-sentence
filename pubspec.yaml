name: simple_sentence
description: "Japanese vocabulary mining → Anki flashcards via LLM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  workmanager: ^0.5.2
  android_intent_plus: ^5.1.0
  flutter_local_notifications: ^18.0.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  uuid: ^4.5.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
